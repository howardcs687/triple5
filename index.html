<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Reminder | Triple 5</title>
    <style>
        /* System fonts load instantly without downloading extra files */
        :root {
            --primary: #00f2fe;
            --accent: #fb0094;
            --bg: #090912;
            --card: #0f0f19;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a0b2e 0%, var(--bg) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .logo-text {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-top: 10px;
        }

        .cyan { color: var(--primary); }
        .pink { color: var(--accent); }

        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .subtitle { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            color: #666; 
            text-transform: uppercase; 
            margin-bottom: 2rem;
        }

        .notice-box {
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 13px;
            line-height: 1.5;
            text-align: left;
        }

        .btn-pay {
            background: linear-gradient(90deg, var(--primary), #fc00ff);
            border: none;
            color: white;
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-pay:active { opacity: 0.8; }

        .footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 9px;
            color: #444;
            letter-spacing: 0.1em;
        }

        /* Modal */
        #paymentModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid var(--accent);
            padding: 2rem;
            border-radius: 1.5rem;
            max-width: 300px;
            width: 90%;
        }

        .btn-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <svg width="50" height="50" viewBox="0 0 100 100" fill="none" style="margin: 0 auto;">
            <circle cx="50" cy="50" r="45" stroke="#00f2fe" stroke-width="2" stroke-dasharray="10 5"/>
            <path d="M35 40L50 25L65 40" stroke="white" stroke-width="4" stroke-linecap="round"/>
            <path d="M35 60L50 75L65 60" stroke="#fb0094" stroke-width="4" stroke-linecap="round"/>
            <rect x="42" y="42" width="16" height="16" rx="2" fill="#00f2fe" />
        </svg>

        <div class="logo-text">Triple <span class="cyan">5</span></div>
        
        <h1>Friendly <span class="pink">Payment Reminder</span></h1>
        <div class="subtitle">Official Billing Notice</div>

        <div class="notice-box">
            Keep your service active by ensuring your payment is made on time. Tap below to copy our GCash details.
        </div>

        <button onclick="copyAndShow()" class="btn-pay">Pay via GCash</button>

        <div class="footer">
            © 2026 SWIFTNET ISP • SECURE ACCESS
        </div>
    </div>

    <div id="paymentModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-top:0">Number Copied!</h2>
            <p style="font-size: 14px; color: #ccc;">
                Open GCash and send payment to:<br>
                <strong style="font-size: 1.2rem; color: var(--primary); display: block; margin-top: 10px;">0910 302 0116</strong>
            </p>
            <button onclick="closeModal()" class="btn-close">Got it</button>
        </div>
    </div>

    <script>
        const gcashNumber = "09103020116"; 
        const modal = document.getElementById('paymentModal');

        function copyAndShow() {
            navigator.clipboard.writeText(gcashNumber);
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
